name: babsim
description: 냉장고 기반 집밥 레시피 추천 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP 클라이언트
  dio: ^5.7.0

  # Google 로그인
  google_sign_in: ^6.2.2

  # 로컬 스토리지 (유저 ID 등 저장)
  shared_preferences: ^2.3.3

  # 라우터
  go_router: ^14.6.2

  # 폰트
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
